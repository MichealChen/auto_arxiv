name: Daily arXiv Recommendations

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  recommend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Prepare config
        env:
          AUTO_ARXIV_CONFIG_TOML: ${{ secrets.AUTO_ARXIV_CONFIG_TOML }}
        run: |
          if [ -n "$AUTO_ARXIV_CONFIG_TOML" ]; then
            printf "%s" "$AUTO_ARXIV_CONFIG_TOML" > config.toml
          elif [ ! -f config.toml ]; then
            cp config.example.toml config.toml
          fi

      - name: Generate recommendations
        run: python -m auto_arxiv recommend --config config.toml

      - name: Upload recommendation artifact
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-recommendations
          path: |
            data/**/*.json
            recommendations/*.md

      - name: Build Pages site
        run: |
          mkdir -p site
          cp -r public/* site/
          cp -r data site/data
          cp -r recommendations site/recommendations

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
