name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build desktop app
        shell: pwsh
        run: .\scripts\build_exe.ps1

      - name: Package release zip
        shell: pwsh
        run: .\scripts\package_release.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto_arxiv-windows-x64
          path: release/auto_arxiv-windows-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            release/auto_arxiv-windows-x64.zip `
            --title "auto_arxiv $env:GITHUB_REF_NAME" `
            --notes "Windows desktop build. Download auto_arxiv-windows-x64.zip, unzip it, and run auto_arxiv.exe."
